services:
  db:
    image: mariadb:10.11
    container_name: healthai-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-healthai_coaching}
      MYSQL_USER: ${DB_USER:-healthai}
      MYSQL_PASSWORD: ${DB_PASSWORD:-healthai}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - healthai_db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthai-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-healthai}
      DB_PASSWORD: ${DB_PASSWORD:-healthai}
      DB_NAME: ${DB_NAME:-healthai_coaching}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-dev}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthai-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      INTERNAL_API_URL: http://backend:8000/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: healthai-etl
    profiles: ["etl"]
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-healthai}
      DB_PASSWORD: ${DB_PASSWORD:-healthai}
      DB_NAME: ${DB_NAME:-healthai_coaching}
      FOOD_CSV: /app/data/daily_food_nutrition_dataset.csv
      GYM_CSV: /app/data/gym_members_exercise_tracking.csv
      SLEEP_CSV: /app/data/Sleep_health_and_lifestyle_dataset.csv
      EXERCISE_DATASET_DIR: /app/data/exercisedb_v1_sample
      EXERCISES_JSON: /app/data/exercisedb_v1_sample/exercises.json
      BODYPARTS_JSON: /app/data/exercisedb_v1_sample/bodyParts.json
      EQUIPMENTS_JSON: /app/data/exercisedb_v1_sample/equipments.json
      MUSCLES_JSON: /app/data/exercisedb_v1_sample/muscles.json
      PROGRESSION_PHOTOS_DIR: "/app/data/before after"
      USERS_EXPORT_CSV: /app/etl/exports/generated_users_credentials.csv
    volumes:
      - ./data:/app/data:ro
      - ./etl/exports:/app/etl/exports
    depends_on:
      db:
        condition: service_healthy

volumes:
  healthai_db_data:
